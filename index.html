<!DOCTYPE html>
<html lang="hu" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Érettségi Fókusz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.5.1/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button id="hamburgerMenu" class="btn-icon">☰</button>
            <div class="logo">🎓 Érettségi<span>Fókusz</span></div>
        </div>
        <div class="controls">
            <div class="zoom-controls">
                <button id="zoomOut" class="zoom-btn" title="Kicsinyítés">−</button>
                <span id="zoomLevel" class="zoom-level">100%</span>
                <button id="zoomIn" class="zoom-btn" title="Nagyítás">+</button>
            </div>

            <input type="text" id="searchInput" placeholder="🔍 Keresés tételekben..." class="search-input">
            <span id="syncStatus" class="sync-status">Betöltés...</span>
            <button id="themeToggle" class="btn-icon">🌙</button>
        </div>
    </header>

    <div class="layout">
        <aside class="resizable-sidebar">
            <div class="sidebar-section">
                <h3 class="section-title">Tantárgyak</h3>
                <ul id="mainTabs" class="nav-menu"></ul>
            </div>
            <div class="sidebar-section">
                <h3 class="section-title">Kategóriák</h3>
                <ul id="subTabs" class="pill-menu"></ul>
            </div>
            <div class="sidebar-section">
                <h3 id="fileListTitle" class="section-title">Tételek</h3>
                <div id="fileGrid" class="file-grid"></div>
            </div>
        </aside>

        <main class="content-area">
            <div id="contentView" class="view-container">
                <div class="welcome-msg">
                    <h2>Üdvözöllek!</h2>
                    <p>Válassz egy tételt a bal oldali menüből a tanuláshoz!</p>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
